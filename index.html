<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今天吃什麼 APP</title>
  <!-- 引入 Tailwind CSS 以使用原有的樣式類別 -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans">

  <div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
    <!-- 模擬手機外框 -->
    <div class="w-full max-w-[360px] h-[640px] bg-[#EAF5F4] rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col border-[12px] border-gray-800 relative">
      
      <!-- 手機頂部狀態列 (極簡版，符合新設計) -->
      <div class="flex justify-between items-center px-6 py-3 text-gray-600 text-xs font-medium z-10 bg-transparent">
        <span>10:30</span>
        <div class="flex gap-1.5 items-center">
          <!-- 模擬訊號和電池圖示 -->
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21L15.6 16.2C14.6 15.45 13.35 15 12 15C10.65 15 9.4 15.45 8.4 16.2L12 21ZM12 3C7.95 3 4.21 4.34 1.2 6.6L3 9C5.5 7.12 8.62 6 12 6C15.38 6 18.5 7.12 21 9L22.8 6.6C19.79 4.34 16.05 3 12 3Z"/></svg>
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M15.67 4H14V2H10V4H8.33C7.6 4 7 4.6 7 5.33V20.67C7 21.4 7.6 22 8.33 22H15.67C16.4 22 17 21.4 17 20.67V5.33C17 4.6 16.4 4 15.67 4Z"/></svg>
        </div>
      </div>

      <!-- 內容區域 -->
      <div class="flex-1 flex flex-col items-center pt-8 px-6 pb-10 overflow-y-auto">
        
        <!-- 標題：今天吃什麼？ -->
        <div class="text-center mb-8 flex flex-col items-center">
          <h1 class="text-[32px] font-bold text-[#1a5c57] tracking-wider">
            今天吃什麼？
          </h1>
          <div class="w-12 h-[5px] bg-[#1a5c57] rounded-full mt-2"></div>
        </div>

        <!-- 食物圖片與點綴 (以 SVG 繪製的沙拉碗插圖) -->
        <div class="w-64 h-48 mb-10 relative flex justify-center items-center">
          <!-- 點綴小線條 -->
          <svg class="absolute w-full h-full" viewBox="0 0 200 150">
            <line x1="40" y1="50" x2="30" y2="40" stroke="#13807a" stroke-width="4" stroke-linecap="round" />
            <line x1="20" y1="65" x2="35" y2="60" stroke="#13807a" stroke-width="4" stroke-linecap="round" />
            <line x1="160" y1="50" x2="170" y2="40" stroke="#13807a" stroke-width="4" stroke-linecap="round" />
            <line x1="180" y1="65" x2="165" y2="60" stroke="#13807a" stroke-width="4" stroke-linecap="round" />
            
            <!-- 番茄 (後層) -->
            <circle cx="135" cy="80" r="25" fill="#f26d5b" />
            <!-- 番茄切片十字紋理 -->
            <line x1="135" y1="60" x2="135" y2="100" stroke="#fbdcd7" stroke-width="2" />
            <line x1="115" y1="80" x2="155" y2="80" stroke="#fbdcd7" stroke-width="2" />
            <line x1="120" y1="65" x2="150" y2="95" stroke="#fbdcd7" stroke-width="2" />
            <line x1="120" y1="95" x2="150" y2="65" stroke="#fbdcd7" stroke-width="2" />
            
            <!-- 生菜葉 (後層) -->
            <path d="M 80 50 Q 100 25 120 50 Q 140 35 145 60 Q 155 80 130 90 Q 90 90 80 50 Z" fill="#b0d680" />

            <!-- 花椰菜 (左側綠色層) -->
            <circle cx="65" cy="70" r="20" fill="#4db051" />
            <circle cx="85" cy="60" r="18" fill="#4db051" />
            <circle cx="50" cy="85" r="15" fill="#4db051" />
            <circle cx="80" cy="80" r="22" fill="#3a903d" />
            <circle cx="60" cy="85" r="20" fill="#3a903d" />

            <!-- 荷包蛋 (前方) -->
            <circle cx="105" cy="85" r="22" fill="#ffffff" />
            <circle cx="105" cy="85" r="10" fill="#facc15" />

            <!-- 青色沙拉碗 -->
            <path d="M 30 90 L 170 90 C 170 145 140 155 100 155 C 60 155 30 145 30 90 Z" fill="#36b4ab" />
            <!-- 碗邊緣亮點/裝飾線 -->
            <path d="M 30 90 C 70 105 130 105 170 90" stroke="#2a9189" stroke-width="2" fill="none" />
            
            <!-- 碗底座 -->
            <rect x="80" y="155" width="40" height="8" fill="#2a9189" rx="3" />
          </svg>
        </div>

        <!-- 按鈕：幫我選 -->
        <button 
          id="pickBtn"
          class="bg-[#13807a] hover:bg-[#0f6863] text-white text-[28px] font-bold py-3 px-10 rounded-[20px] shadow-[0_5px_0_#0d5651] active:translate-y-1 active:shadow-none transition-all duration-100 w-full mb-8 select-none"
        >
          幫我選！
        </button>

        <!-- 結果顯示外框卡片 -->
        <div class="bg-white rounded-[20px] w-full p-5 shadow-sm border border-gray-100 flex flex-col items-center min-h-[130px] justify-center">
          <span class="text-[#13807a] text-xl font-bold mb-3 tracking-widest">
            結果
          </span>
          <span id="resultDisplay" class="text-[#1a5c57] text-[28px] font-bold tracking-widest">
            <!-- JavaScript 會把結果填入這裡 -->
          </span>
        </div>

      </div>
    </div>
  </div>

  <!-- JavaScript 邏輯 -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. 初始化全域變數 (菜單清單)
      const menu = ["螺絲", "機油", "汽油", "引擎", "馬達", "天然氣"];
      
      // 取得按鈕與顯示結果的 HTML 元素
      const pickBtn = document.getElementById('pickBtn');
      const resultDisplay = document.getElementById('resultDisplay');

      // 2. 當按鈕被點選執行的動作
      pickBtn.addEventListener('click', () => {
        // 產生 0 到 5 之間的隨機整數
        const randomIndex = Math.floor(Math.random() * menu.length);
        // 取得對應的清單項目
        const resultText = menu[randomIndex];
        // 更新畫面上的文字
        resultDisplay.textContent = `吃${resultText}！`;
      });
    });
  </script>

</body>
</html>
